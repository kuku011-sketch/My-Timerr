    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

  }
  .card{
    text-align:center;
    padding:2.4rem 3rem;
    border-radius:var(--radius);
    background:var(--card-bg);
    backdrop-filter:blur(6px);
    border:1px solid var(--card-border);
    min-width:320px;
    position:relative;
    z-index:2;
  }
  .mode-row{display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:0.9rem;}
  .mode-btn{
    font-size:12px; padding:6px 12px; border-radius:999px; border:1px solid var(--card-border);
    background:#10131a; color:var(--text-dim); cursor:pointer; transition:all var(--fast) ease;
  }
  .mode-btn.active{ background:var(--accent); color:#1a1200; border-color:var(--accent); font-weight:600;}
  .settings{display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:1.2rem; flex-wrap:wrap;}
  label{font-size:13px; color:var(--text-dim);}
  input[type="number"], input[type="text"]{
    font-size:15px; padding:6px 8px; border-radius:8px; border:1px solid var(--card-border);
    background:#10131a; color:var(--text);
  }
  input[type="number"]{width:70px; text-align:center;}
  #display{font-size:82px; font-weight:600; font-variant-numeric:tabular-nums; margin:0.4rem 0 0.6rem; letter-spacing:1px;}
  #phaseLabel{font-size:13px; color:var(--accent); font-weight:600; letter-spacing:0.5px; min-height:16px; margin-bottom:2px;}
  #status{font-size:13.5px; color:var(--text-dim); margin-bottom:0.4rem; min-height:36px; line-height:1.5;}
  #sessionCount{font-size:12px; color:var(--text-dim); margin-bottom:1rem; min-height:14px;}
  button{
    font-size:14px; padding:9px 18px; border-radius:10px; border:1px solid var(--card-border);
    background:#10131a; color:var(--text); cursor:pointer; transition:background var(--fast) ease;
  }
  button:hover{background:#1c2028;}
  button:active{transform:scale(0.97);}
  .hint{margin-top:1rem; font-size:11.5px; color:#5c5f66; line-height:1.6;}
  #display.warning{color:var(--accent);}
  #display.done{color:#e05353;}

  #maintenance{
    text-align:center; padding:3rem 3.5rem; border-radius:var(--radius);
    background:var(--card-bg); border:1px solid var(--card-border);
  }
  #maintenance .icon{font-size:40px; margin-bottom:1rem;}
  #maintenance p{margin:0.4rem 0; color:var(--text);}
  #maintenance .en{color:var(--text-dim); font-size:14px;}

  /* ===== Toolbar ===== */
  .toolbar-wrap{
    position:fixed; left:24px; bottom:22px;
    z-index:50; display:flex; justify-content:flex-start;
  }
  .toolbar{
    display:flex; align-items:center; gap:4px;
    background:var(--card-bg); border:1px solid var(--card-border);
    border-radius:999px; backdrop-filter:blur(6px);
    padding:10px 22px; height:24px; min-width:220px;
    transition:height var(--fast) ease, padding var(--fast) ease, gap var(--fast) ease, transform var(--fast) ease, border-radius var(--fast) ease, min-width var(--fast) ease;
    overflow:hidden; cursor:pointer;
  }
  .toolbar-wrap:hover .toolbar{
    height:auto; padding:12px 22px; gap:10px; transform:scale(1.03); border-radius:var(--radius); min-width:420px;
  }
  .toolbar-dot{width:48px; height:5px; border-radius:3px; background:var(--card-border); margin:0 auto; transition:opacity var(--fast) ease;}
  .toolbar-wrap:hover .toolbar-dot{opacity:0; height:0; margin:0;}
  .toolbar-items{ display:flex; align-items:center; gap:6px; opacity:0; max-width:0; overflow:hidden; transition:opacity var(--fast) ease; white-space:nowrap;}
  .toolbar-wrap:hover .toolbar-items{ opacity:1; max-width:900px;}
  .tb-item.mode-item.active{ background:var(--accent); color:#1a1200; font-weight:600; }
  .tb-item{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:7px 12px; border-radius:var(--radius-sm); cursor:pointer;
    color:var(--text); font-size:11px; transition:background var(--fast) ease;
    user-select:none;
  }
  .tb-item:hover{ background:#1c2028; }
  .tb-item .ic{font-size:19px;}
  .tb-sep{width:1px; align-self:stretch; background:var(--card-border); margin:2px 2px;}

  /* ===== Panels ===== */
  .panel{
    position:fixed; z-index:80; width:320px;
    background:var(--card-bg); border:1px solid var(--card-border);
    border-radius:var(--radius); backdrop-filter:blur(8px);
    box-shadow:0 12px 30px rgba(0,0,0,0.4);
    transform-origin:bottom center;
    transition:transform var(--fast) ease, opacity var(--fast) ease;
  }
  .panel[hidden]{ display:none; }
  .panel.closing{ transform:scale(0.85); opacity:0; }

  /* Slide-in-from-left panels (Common Room / Quests) */
  .panel.from-left{ transform-origin:bottom left; }
  .panel.from-left.opening{ animation:slideInLeft var(--fast) ease both; }
  .panel.from-left.closing{ animation:slideOutLeft var(--fast) ease both; }
  @keyframes slideInLeft{
    from{ opacity:0; transform:translateX(-26px) scale(0.92); }

<script>
/* ============ TIMER CORE ============ */
const minsInput = document.getElementById('mins');
const workMinsInput = document.getElementById('workMins');
const breakMinsInput = document.getElementById('breakMins');
const display = document.getElementById('display');
const status = document.getElementById('status');
const phaseLabel = document.getElementById('phaseLabel');
const sessionCountEl = document.getElementById('sessionCount');
const resetBtn = document.getElementById('resetBtn');
const modeNormalBtn = document.getElementById('modeNormalBtn');
const modePomoBtn = document.getElementById('modePomoBtn');
const normalSettings = document.getElementById('normalSettings');
const pomoSettings = document.getElementById('pomoSettings');

let mode = 'normal'; // 'normal' | 'pomodoro'
let pomoPhase = 'work'; // 'work' | 'break'
let sessionsDone = 0;
let remaining = 120;
let timerId = null;

function fmt(s){
  s = Math.max(0, Math.round(s));
  const m = Math.floor(s/60), sec = s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function updateDisplay(){
  display.textContent = fmt(remaining);
  display.classList.remove('warning','done');
  if(remaining<=0) display.classList.add('done');
  else if(remaining<=10) display.classList.add('warning');
}
function stopTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }

function getNormalSeconds(){
  const v = parseFloat(minsInput.value);
  return Math.max(1, Math.round((isNaN(v)?2:v)*60));
}
function getWorkSeconds(){
  const v = parseFloat(workMinsInput.value);
  return Math.max(1, Math.round((isNaN(v)?25:v)*60));
}
function getBreakSeconds(){
  const v = parseFloat(breakMinsInput.value);
  return Math.max(1, Math.round((isNaN(v)?5:v)*60));
}
function updateSessionLabel(){
  sessionCountEl.textContent = mode==='pomodoro' ? (sessionsDone+' session'+(sessionsDone===1?'':'s')+' done') : '';
}

let isRunning = false;

function tick(){
  remaining -= 1;
  updateDisplay();
  if(remaining<=0){
    stopTimer();
    isRunning = false;
    if(mode==='pomodoro'){
      if(pomoPhase==='work'){
        sessionsDone += 1;
        updateSessionLabel();
        pomoPhase='break';
      } else {
        pomoPhase='work';
      }
      startTimer();
    } else {
      status.innerHTML = "Time's up! Press Spacebar to restart";
    }
  }
}

/* Normal mode: Space always restarts the countdown from the full duration. */
function startTimer(){
  stopTimer();
  isRunning = true;
  if(mode==='normal'){
    remaining = getNormalSeconds();
    phaseLabel.textContent = '';
    status.innerHTML = 'Counting down… press Spacebar to restart';
  } else {
    remaining = pomoPhase==='work' ? getWorkSeconds() : getBreakSeconds();
    phaseLabel.textContent = pomoPhase==='work' ? '🍅 FOCUS' : '☕ BREAK';
    status.innerHTML = 'Running — press Spacebar to pause';
  }
  updateDisplay();
  timerId = setInterval(tick,1000);
}

/* Pomodoro mode: Space pauses/resumes without losing progress. */
function pauseTimer(){
  stopTimer();
  isRunning = false;
  status.innerHTML = 'Paused — press Spacebar to resume';
}
function resumeTimer(){
  isRunning = true;
  status.innerHTML = 'Running — press Spacebar to pause';
  timerId = setInterval(tick,1000);
}
function toggleSpace(){
  if(mode==='normal'){
    startTimer();
  } else {
    if(isRunning) pauseTimer();
    else resumeTimer();
  }
}

function stopFully(){
  stopTimer();
  isRunning = false;
  status.innerHTML = 'Stopped — press Spacebar to start';
}

function resetOnly(){
  stopTimer();
  isRunning = false;
  if(mode==='normal'){
    remaining = getNormalSeconds();
    phaseLabel.textContent='';
    status.innerHTML = 'Press Spacebar to restart<br>Press Enter to stop';
  } else {
    pomoPhase='work';
    remaining = getWorkSeconds();
    phaseLabel.textContent = '🍅 READY';
    status.innerHTML = 'Press Spacebar to start<br>Press Enter to stop and reset';
  }
  updateDisplay();
  updateSessionLabel();
}

function setActiveTaskTimer(taskMins){
  mode = 'normal';
  modeNormalBtn.classList.add('active');
  modePomoBtn.classList.remove('active');
  normalSettings.style.display='flex';
  pomoSettings.style.display='none';
  minsInput.value = taskMins;
  resetOnly();
}

modeNormalBtn.addEventListener('click', ()=>{
  mode='normal';
  modeNormalBtn.classList.add('active'); modePomoBtn.classList.remove('active');
  normalSettings.style.display='flex'; pomoSettings.style.display='none';
  resetOnly();
});
modePomoBtn.addEventListener('click', ()=>{
  mode='pomodoro';
  modePomoBtn.classList.add('active'); modeNormalBtn.classList.remove('active');
  normalSettings.style.display='none'; pomoSettings.style.display='flex';
  resetOnly();
});
resetBtn.title = 'Reset';

resetBtn.addEventListener('click', resetOnly);
minsInput.addEventListener('change', ()=>{ if(mode==='normal') resetOnly(); });
workMinsInput.addEventListener('change', ()=>{ if(mode==='pomodoro' && pomoPhase==='work') resetOnly(); });
breakMinsInput.addEventListener('change', ()=>{});

window.addEventListener('keydown', (e)=>{
  const tag = document.activeElement.tagName;
  if(tag==='INPUT' || tag==='TEXTAREA') return;
  if(e.code==='Space' || e.key===' '){ e.preventDefault(); toggleSpace(); }
  else if(e.code==='Enter' || e.key==='Enter'){ e.preventDefault(); resetOnly(); }
});

/* ============ BACKGROUND ============ */
const bgFab = document.getElementById('bgFab');
const bgFile = document.getElementById('bgFile');
function applyBackground(dataUrl){
  document.body.style.backgroundImage = "url('"+dataUrl+"')";
}
function loadSavedBackground(){
  try{ const saved = localStorage.getItem('myTimerBg'); if(saved) applyBackground(saved); }catch(err){}
}
bgFab.addEventListener('click', ()=> bgFile.click());
bgFile.addEventListener('change', ()=>{
  const file = bgFile.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    applyBackground(reader.result);
    try{ localStorage.setItem('myTimerBg', reader.result); }catch(err){}
  };
  reader.readAsDataURL(file);
});

/* ============ PANELS (open/close/drag) ============ */
function openPanel(id){
  const p = document.getElementById(id);
  p.hidden = false;
  p.classList.remove('closing');
  if(p.classList.contains('from-left')){
    p.classList.remove('opening'); void p.offsetWidth; p.classList.add('opening');
  }
}
function closePanel(id){
  const p = document.getElementById(id);
  p.classList.remove('opening');
  p.classList.add('closing');
  setTimeout(()=>{ p.hidden = true; p.classList.remove('closing'); }, 200);
}
document.querySelectorAll('.panel-close').forEach(el=>{
  el.addEventListener('click', ()=> closePanel(el.dataset.close));
});
document.getElementById('tbRoom').addEventListener('click', ()=> openPanel('roomPanel'));
document.getElementById('tbQuests').addEventListener('click', ()=> openPanel('questsPanel'));
document.getElementById('tbCredits').addEventListener('click', ()=> openPanel('creditsPanel'));

function makeDraggable(panelId, headerId){
  const panel = document.getElementById(panelId);
  const header = document.getElementById(headerId);
  let dragging=false, offX=0, offY=0;
  header.addEventListener('mousedown', (e)=>{
    dragging=true;
    const rect = panel.getBoundingClientRect();
    offX = e.clientX - rect.left; offY = e.clientY - rect.top;
    panel.style.right='auto'; panel.style.bottom='auto'; panel.style.left=rect.left+'px'; panel.style.top=rect.top+'px'; panel.style.transform='none';
  });
  window.addEventListener('mousemove', (e)=>{
    if(!dragging) return;
    panel.style.left = (e.clientX-offX)+'px';
    panel.style.top = (e.clientY-offY)+'px';
  });
  window.addEventListener('mouseup', ()=> dragging=false);
}
makeDraggable('roomPanel','roomHeader');
makeDraggable('questsPanel','questsHeader');

/* ============ DEVICE IDENTITY (each device/browser gets its own persistent id + color) ============ */
function makeDeviceId(){ return 'd-'+Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4); }
let deviceId = localStorage.getItem('myTimerDeviceId');
if(!deviceId){ deviceId = makeDeviceId(); localStorage.setItem('myTimerDeviceId', deviceId); }
function deviceColor(id){
  let h=0; for(let i=0;i<id.length;i++) h = (h*31 + id.charCodeAt(i))%360;
  return 'hsl('+h+',65%,60%)';
}
const myColor = deviceColor(deviceId);

/* ============ COMMON ROOM CHAT ============ */
let myName = null;
const nameGate = document.getElementById('nameGate');
const chatArea = document.getElementById('chatArea');
const nameInput = document.getElementById('nameInput');
const joinBtn = document.getElementById('joinBtn');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtnImg = document.getElementById('sendBtnImg');
const onlineCount = document.getElementById('onlineCount');
const attachBtn = document.getElementById('attachBtn');
const chatImgFile = document.getElementById('chatImgFile');
const deviceBadge = document.getElementById('deviceBadge');

deviceBadge.textContent = 'This device: '+deviceId;
deviceBadge.style.color = myColor;
nameInput.value = localStorage.getItem('myTimerName') || '';

let sendImgIndex = 0;
function rotateSendImg(){
  sendImgIndex = Math.floor(Math.random()*MSG_IMAGES.length);
  sendBtnImg.src = MSG_IMAGES[sendImgIndex];
  sendBtnImg.classList.remove('bounce'); void sendBtnImg.offsetWidth; sendBtnImg.classList.add('bounce');
}
rotateSendImg();
setInterval(rotateSendImg, 5000); /* playful idle rotation of the send button, every 5s */

let bc = null;
try{ bc = new BroadcastChannel('my-timer-room'); }catch(e){}
let tabId = Math.random().toString(36).slice(2);
let peers = new Set([tabId]);
let roomCode = 'my-timer-default-room';

function renderOnline(){
  onlineCount.textContent = '('+peers.size+' tab(s) here)';
}
renderOnline();

function addMessage(who, text, imgSrc, color){
  const div = document.createElement('div');
  div.className='msg';
  const whoDiv = document.createElement('div');
  whoDiv.className='who'; whoDiv.textContent = who;
  if(color) whoDiv.style.color = color;
  div.appendChild(whoDiv);
  if(text){ const t=document.createElement('div'); t.textContent=text; div.appendChild(t); }
  if(imgSrc){ const img=document.createElement('img'); img.className='chat-img'; img.src=imgSrc; div.appendChild(img); }
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

/* ---- Cross-device sync via kvdb.io (free, no-signup key-value store) ----
   Everyone who enters the same Room code shares the same kvdb.io bucket,
   so messages sync between different computers/phones - not just tabs on
   one device. It's polling-based (checked every ~3s), not instant push. */
let kvBucket = localStorage.getItem('myTimerKvBucket') || null;
let lastChatSig = '';
async function ensureBucket(){
  if(kvBucket) return;
  try{
    const res = await fetch('https://kvdb.io/', {method:'POST'});
    kvBucket = (await res.text()).trim();
    localStorage.setItem('myTimerKvBucket', kvBucket);
  }catch(e){ kvBucket = null; }
}
function kvKey(suffix){ return 'https://kvdb.io/'+kvBucket+'/'+roomCode+'_'+suffix; }
async function kvGet(suffix){
  if(!kvBucket) return null;
  try{
    const res = await fetch(kvKey(suffix));
    if(res.status===404) return null;
    return await res.text();
  }catch(e){ return null; }
}
async function kvSet(suffix, value){
  if(!kvBucket) return;
  try{ await fetch(kvKey(suffix), {method:'PUT', body:value}); }catch(e){}
}

let chatLog = [];
async function pollChat(){
  const raw = await kvGet('chat');
  if(raw===null || raw===lastChatSig) return;
  lastChatSig = raw;
  try{
    const arr = JSON.parse(raw);
    chatMessages.innerHTML='';
    arr.forEach(m=> addMessage(m.name, m.text, m.img, m.color));
    chatLog = arr;
  }catch(e){}
}
async function pushChatMessage(msg){
  chatLog.push(msg);
  if(chatLog.length>200) chatLog = chatLog.slice(-200);
  const raw = JSON.stringify(chatLog);
  lastChatSig = raw;
  await kvSet('chat', raw);
}

joinBtn.addEventListener('click', async ()=>{
  const val = nameInput.value.trim();
  if(!val) return;
  myName = val;
  localStorage.setItem('myTimerName', myName);
  nameGate.style.display='none';
  chatArea.style.display='block';
  if(bc) bc.postMessage({type:'join', id:tabId, name:myName});
  await ensureBucket();
  await pollChat();
  setInterval(pollChat, 3000);
});
nameInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); joinBtn.click(); } });

function sendChatWith(text, imgSrc){
  if(!text && !imgSrc) return;
  if(!myName) return;
  const msg = {name:myName, text:text||'', img:imgSrc||null, color:myColor};
  addMessage(msg.name, msg.text, msg.img, msg.color);
  if(bc) bc.postMessage({type:'msg', id:tabId, name:myName, text:text||'', img:imgSrc||null, color:myColor});
  pushChatMessage(msg);
}
function sendChat(){
  const text = chatInput.value.trim();
  rotateSendImg();
  sendChatWith(text, null);
  chatInput.value='';
}
chatInput.addEventListener('keydown', (e)=>{
  if(e.key==='Enter'){ e.preventDefault(); sendChat(); }
});
sendBtnImg.addEventListener('click', sendChat);

attachBtn.addEventListener('click', ()=> chatImgFile.click());

/* Attach button playfully cycles through emoticons with a sliding transition */
const ATTACH_EMOTICONS = [":D", ":)", ">:)", ":>", ":o", ":P"];
let attachEmoIndex = 0;
const attachEmoSpan = attachBtn.querySelector('.emo');
function rotateAttachEmoticon(){
  attachEmoSpan.classList.add('slide-out');
  setTimeout(()=>{
    attachEmoIndex = (attachEmoIndex + 1) % ATTACH_EMOTICONS.length;
    attachEmoSpan.textContent = ATTACH_EMOTICONS[attachEmoIndex];
    attachEmoSpan.classList.remove('slide-out');
    attachEmoSpan.classList.add('slide-in');
    void attachEmoSpan.offsetWidth;
    attachEmoSpan.classList.remove('slide-in');
  }, 280);
}
setInterval(rotateAttachEmoticon, 2500);
chatImgFile.addEventListener('change', ()=>{
  const file = chatImgFile.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{ sendChatWith('', reader.result); chatImgFile.value=''; };
  reader.readAsDataURL(file);
});

if(bc){
  bc.onmessage = (e)=>{
    const data = e.data;
    if(data.id===tabId) return;
    if(data.type==='join' || data.type==='ping'){
      peers.add(data.id); renderOnline();
      bc.postMessage({type:'ping', id:tabId});
    } else if(data.type==='msg'){
      addMessage(data.name, data.text, data.img, data.color);
      peers.add(data.id); renderOnline();
    } else if(data.type==='leave'){
      peers.delete(data.id); renderOnline();
    }
  };
  window.addEventListener('beforeunload', ()=>{
    bc.postMessage({type:'leave', id:tabId});
  });
  bc.postMessage({type:'ping', id:tabId});
}

/* ============ QUESTS ============ */
const taskTableBody = document.querySelector('#taskTable tbody');
const newTaskInput = document.getElementById('newTaskInput');
const addTaskBtn = document.getElementById('addTaskBtn');
let taskCounter = 0;

function addTaskRow(name){
  taskCounter += 1;
  const id = 'task_'+taskCounter;
  const tr = document.createElement('tr');
  tr.innerHTML = '<td><span class="task-name" id="'+id+'">'+name+'<span class="line"></span></span></td>'+
    '<td><input type="number" class="task-timer" min="0" placeholder="min"></td>'+
    '<td class="task-del-cell"><button class="task-del" title="Delete quest"><img alt="Delete"></button></td>';
  taskTableBody.appendChild(tr);
  const delImg = tr.querySelector('.task-del img');
  delImg.src = DELETE_ICON;
  const nameSpan = tr.querySelector('.task-name');
  nameSpan.addEventListener('click', ()=>{
    nameSpan.classList.toggle('done');
    nameSpan.classList.remove('wobble');
    void nameSpan.offsetWidth;
    nameSpan.classList.add('wobble');
  });
  const timerInput = tr.querySelector('.task-timer');
  timerInput.addEventListener('change', ()=>{
    const v = parseFloat(timerInput.value);
    if(v && v>0){ setActiveTaskTimer(v); }
  });
  tr.querySelector('.task-del').addEventListener('click', ()=>{ tr.remove(); });
}
addTaskBtn.addEventListener('click', ()=>{
  const val = newTaskInput.value.trim();
  if(!val) return;
  addTaskRow(val);
  newTaskInput.value='';
});
newTaskInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); addTaskBtn.click(); } });

/* seed a couple example tasks */
addTaskRow('Làm đề Toán số 1');
addTaskRow('Học từ vựng Tiếng Anh');

} else {
  resetOnly();
}
</script>
